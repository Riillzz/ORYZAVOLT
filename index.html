<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>ORYZAVOLT Login</title>

<link rel="stylesheet"
      href="log in.css">
<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div class="login-container">

    <div class="logo">
    🌾⚡
    </div>
    <h1>ORYZAVOLT</h1>
    <p>Sistem Gasifikasi Biomassa Dari Sekam Padi</p>

    <input
        type="text"
        id="username"
        placeholder="Username">

    <div class="password-box">

    <input
        type="password"
        id="password"
        placeholder="Password">

    <i
    class="fa-solid fa-eye toggle-password"
    id="eyeIcon"
    onclick="togglePassword()">
    </i>
    </div>

    <button onclick="login()">
        LOGIN >
    </button>

    <div id="error"></div>

</div>

<script src="log in.js"></script>

</body>
</html>
