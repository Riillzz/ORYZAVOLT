<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>ORYZAVOLT Login</title>

<link rel="stylesheet"
      href="log in.css">
</head>

<body>

<div class="login-container">

    <div class="logo">
    🌾⚡
    </div>
    <h1>ORYZAVOLT</h1>
    <p>Sistem Gasifikasi Biomassa Dari Sekam Padi</p>

    <input
        type="text"
        id="username"
        placeholder="Username">

    <div class="password-box">

    <input
        type="password"
        id="password"
        placeholder="Password">

    <span
        class="toggle-password"
        onclick="togglePassword()">
        👁️
    </span>
    </div>

    <button onclick="login()">
        LOGIN >
    </button>

    <div id="error"></div>

</div>

<script src="log in.js"></script>

</body>
</html>
